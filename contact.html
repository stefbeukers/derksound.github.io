<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | DerkSound</title>
    <style>
        :root {
            --dark-blue: #1a1a1a;
            --teal: #4db6ac;
            --white: #f5f5f5;
            --accent: #263238;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            line-height: 1.6;
            color: var(--dark-blue);
            background-color: var(--white);
        }

        header {
            background: #fff;
            padding: 1rem 0;
            position: sticky;
            top: 0;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            z-index: 1000;
        }

        nav {
            display: flex;
            justify-content: space-around;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
        }

        .logo-placeholder {
            font-weight: bold;
            font-size: 1.5rem;
            color: var(--dark-blue);
            text-decoration: none;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--dark-blue);
            margin: 0 15px;
            font-weight: 500;
        }

        .contact-container {
            padding: 4rem 2rem;
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            margin-top: 2rem;
        }

        h2 {
            color: var(--teal);
            text-align: center;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        input, select, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box; /* Zorgt dat padding de breedte niet beïnvloedt */
        }

        .btn-submit {
            background-color: var(--teal);
            color: white;
            padding: 12px;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
            font-size: 1rem;
            transition: background 0.3s;
        }

        .btn-submit:hover {
            background-color: var(--accent);
        }

        footer {
            background: var(--accent);
            color: white;
            text-align: center;
            padding: 2rem 0;
            position: relative;
            bottom: 0;
            width: 100%;
            margin-top: 4rem;
        }
    </style>
</head>
<body>

<header>
    <nav>
        <a href="index.html" class="logo-placeholder">DERKSOUND</a>
        <div class="nav-links">
            <a href="index.html#echo">Echografie</a>
            <a href="index.html#sport">Sport & Lifestyle</a>
            <a href="contact.html">Contact</a>
        </div>
    </nav>
</header>

<section class="contact-container">
    <h2>Neem contact op</h2>
    <p style="text-align: center;">Heeft u een vraag over een training, cursus of coaching traject? Vul het formulier in en ik kom er zo snel mogelijk op terug.</p>
    
    <form action="#" method="POST"> <div class="form-group">
            <label for="naam">Naam</label>
            <input type="text" id="naam" name="naam" required placeholder="Uw volledige naam">
        </div>

        <div class="form-group">
            <label for="email">E-mailadres</label>
            <input type="email" id="email" name="email" required placeholder="Uw e-mailadres">
        </div>

        <div class="form-group">
            <label for="tel">Telefoonnummer</label>
            <input type="tel" id="tel" name="tel" placeholder="Uw telefoonnummer">
        </div>

        <div class="form-group">
            <label for="onderwerp">Waar gaat uw vraag over?</label>
            <select id="onderwerp" name="onderwerp">
                <option value="echografie">Echografie & Incompany Training</option>
                <option value="lifestyle">Lifestylecoaching</option>
                <option value="sport">Kickboksen / Bokszaktraining</option>
                <option value="parkinson">Parkinson Boks Training</option>
                <option value="anders">Anders</option>
            </select>
        </div>

        <div class="form-group">
            <label for="bericht">Bericht</label>
            <textarea id="bericht" name="bericht" rows="5" required placeholder="Wat kan ik voor u betekenen?"></textarea>
        </div>

        <button type="submit" class="btn-submit">VERZENDEN</button>
    </form>
</section>

<footer>
    <p>&copy; 2026 DerkSound - Specialist in Beweging</p>
</footer>

</body>
</html>
